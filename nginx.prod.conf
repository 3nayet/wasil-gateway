# wasil PROD reverse proxy (single-VM alpha).
# Caddy terminates TLS in front of this nginx on :80.
# Two server blocks: api.<domain> and admin.<domain>.
#
# To migrate to a cloud LB later, encode the location blocks below as
# listener rules pointing at the same upstreams (target groups).

worker_processes auto;
events { worker_connections 4096; }

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstreams resolve via docker compose service DNS on the shared network.
    upstream core_upstream            { server wasil-be:8080; }
    upstream admin_upstream           { server wasil-admin:80; }
    # Placeholders for services not yet deployed in alpha. Return 503 until added.
    # upstream fleet_ingestion_upstream  { server wasil-fleet-ingestion:8085; }
    # upstream fleet_monitoring_upstream { server wasil-fleet-monitoring:8086; }

    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 30s;

    # ====================== api.<domain> ======================
    server {
        listen 80;
        server_name _;  # Caddy already filtered by host; accept anything it forwards.

        # Fleet WS routes — not deployed in alpha; respond 503 so clients fail fast.
        location = /ws/hero.location        { return 503; }
        location = /ws/admin.fleet-monitor  { return 503; }

        # Core STOMP WebSocket
        location /ws {
            proxy_pass http://core_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin SPA — served when host is admin.<domain>; Caddy routes by host
        # but we also support path-based /admin/ for convenience.
        location /admin/ {
            proxy_pass http://admin_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Core REST + actuator
        location / {
            proxy_pass http://core_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
