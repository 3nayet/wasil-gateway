# Prod compose deployed to /opt/wasil/docker-compose.yml on the VM.
# Pulls app images from GHCR; backing services run as containers.
# Postgres is intentionally exposed on :5432 publicly per ops decision —
# protect via Hetzner Cloud Firewall (allow only your IPs) + strong password.

name: wasil

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - API_DOMAIN=${API_DOMAIN}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [gateway, wasil-admin]

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./gateway/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on: [wasil-be, wasil-admin]

  wasil-be:
    image: ghcr.io/${GHCR_OWNER}/wasil-be:${WASIL_BE_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      rabbitmq: { condition: service_started }

  wasil-admin:
    image: ghcr.io/${GHCR_OWNER}/wasil-admin:${WASIL_ADMIN_TAG:-latest}
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"   # public Postgres access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  caddy_data:
  caddy_config:
