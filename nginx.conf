# wasil local reverse proxy
#
# Path-based routing — designed to map 1:1 onto a cloud LB listener rule set
# (AWS ALB rules, GCP HTTPS LB URL-maps, Azure App Gateway path-based rules,
# Cloudflare workers/rules). To migrate, encode the `location` blocks below
# as listener rules pointing at the same upstreams (replace host.docker.internal
# with the corresponding cloud-internal hostnames / target groups).
#
# Routes:
#   /ws/hero.location       -> wasil-fleet-ingestion         (raw WebFlux WS, GPS pings)
#   /ws/admin.fleet-monitor -> wasil-fleet-monitoring-service (raw WebFlux WS, admin map)
#   /ws                     -> wasil-be core                  (STOMP: dispatch offers)
#   everything else         -> wasil-be core                  (REST + actuator)

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # Required for proxying WebSocket Upgrade headers.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Apps run on the host (IDE), reachable from inside docker via host.docker.internal.
    # In cloud, swap each upstream for the corresponding service DNS / target group.
    upstream core_upstream {
        server host.docker.internal:8080;
    }

    upstream fleet_ingestion_upstream {
        server host.docker.internal:8085;
    }

    upstream fleet_monitoring_upstream {
        server host.docker.internal:8086;
    }

    server {
        listen 80;
        server_name _;

        # Generous timeouts for long-lived sockets; tune per cloud LB limits in prod.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 30s;

        # --- High-throughput GPS ingestion (WebFlux WebSocket) -------------------
        location = /ws/hero.location {
            proxy_pass http://fleet_ingestion_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Admin fleet-map dashboard (WebFlux WebSocket) -----------------------
        location = /ws/admin.fleet-monitor {
            proxy_pass http://fleet_monitoring_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Core STOMP endpoint (dispatch offers) -------------------------------
        location /ws {
            proxy_pass http://core_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Default: core REST API + actuator -----------------------------------
        location / {
            proxy_pass http://core_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
